<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tính tiền cước</title>
<style>
body{font-family:system-ui;background:#f5f7fa;padding:16px}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
label{font-weight:600;display:block;margin-top:8px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd}
button{margin-top:12px;width:100%;padding:12px;border:0;border-radius:10px;background:#2d7df4;color:#fff;font-weight:700}
.line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #ddd}
.total{font-size:18px;font-weight:900;text-align:right;margin-top:8px}
</style>
</head>

<body>

<div class="card">
  <h3>TÍNH TIỀN CƯỚC</h3>

  <label>Quãng đường 1 chiều (km)</label>
  <input id="km" type="number" step="0.1" value="10">

  <label>Thời gian chờ (phút)</label>
  <input id="wait" type="number" value="0">

  <label>
    <input type="checkbox" id="roundTrip">
    Đi 2 chiều (≥30km giảm 70% chiều về)
  </label>

  <button onclick="calc()">TÍNH TIỀN</button>
</div>

<div class="card" id="result" style="display:none">
  <h3>CHI TIẾT</h3>
  <div id="detail"></div>
  <div class="total" id="total"></div>
</div>

<script>
const PRICE = {
  open: 5000,
  km0_60: 7500,
  kmOver60: 7000,
  waitPerMin: 500
};

function calc(){
  const km = parseFloat(document.getElementById('km').value)||0;
  const wait = parseInt(document.getElementById('wait').value)||0;
  const roundTrip = document.getElementById('roundTrip').checked;

  if(km<=0) return alert("Nhập quãng đường!");

  let costKm = 0;
  if(km<=60){
    costKm = km * PRICE.km0_60;
  }else{
    costKm = 60 * PRICE.km0_60 + (km-60) * PRICE.kmOver60;
  }

  let costOpen = PRICE.open;
  let costWait = wait * PRICE.waitPerMin;

  let costReturn = 0;
  if(roundTrip && km>=30){
    costReturn = costKm * 0.3; // giảm 70%
  }

  const total = costOpen + costKm + costReturn + costWait;

  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="line"><span>Mở cửa</span><span>${costOpen.toLocaleString()} đ</span></div>
    <div class="line"><span>Chiều đi</span><span>${costKm.toLocaleString()} đ</span></div>
    <div class="line"><span>Chiều về</span><span>${costReturn.toLocaleString()} đ</span></div>
    <div class="line"><span>Tiền chờ</span><span>${costWait.toLocaleString()} đ</span></div>
  `;

  document.getElementById('total').textContent =
    "TỔNG: " + total.toLocaleString() + " đ";

  document.getElementById('result').style.display="block";
}
</script>

</body>
</html>
